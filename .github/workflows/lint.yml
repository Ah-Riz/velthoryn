name: Lint

on:
  push:
    branches-ignore: [main, test]
  pull_request:
    branches: [main, test]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://ci:ci@127.0.0.1:5432/ci"
      ADMIN_API_KEY: "ci-test-key"
      NEXT_PUBLIC_RPC_ENDPOINT: "https://api.devnet.solana.com"
      CARGO_INCREMENTAL: 0
      CARGO_TERM_COLOR: always

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: >
          cargo clippy --workspace --
          -D warnings
          -A unexpected_cfgs
          -A unused_imports
          -A ambiguous_glob_reexports
          -A clippy::diverging_sub_expression

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Push DB schema
        run: |
          cd apps/web
          set -o pipefail
          echo "y" | pnpm drizzle-kit push 2>&1 | tee /tmp/drizzle-push.log
          ! grep -q "TypeError: Do not know how to serialize a BigInt" /tmp/drizzle-push.log
          psql "$DATABASE_URL" -c '\dt' | grep -q campaigns

      - name: Next.js lint
        run: cd apps/web && pnpm lint

      - name: Vitest
        run: cd apps/web && pnpm test

      - name: Next.js build
        run: cd apps/web && pnpm build