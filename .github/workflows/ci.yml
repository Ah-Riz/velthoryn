name: ci

on:
  push:
    branches-ignore: [main, test]
  pull_request:
    branches: [main, test]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: 0
      CARGO_TERM_COLOR: always
      CARGO_NET_RETRY: 10
      CARGO_NET_TIMEOUT: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Cache Solana
        uses: actions/cache@v4
        id: solana-cache
        with:
          path: |
            ~/.cache/solana
            ~/.local/share/solana/install
          key: solana-${{ runner.os }}-2.1.6
          restore-keys: |
            solana-${{ runner.os }}-

      - name: Install Solana CLI 2.1.6
        if: steps.solana-cache.outputs.cache-hit != 'true'
        run: sh -c "$(curl -sSfL https://release.anza.xyz/v2.1.6/install)"

      - name: Ensure Solana dirs and wallet
        run: |
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
          # cargo-build-sbf calls fs::read_dir(~/.cache/solana).unwrap() at startup
          # (find_installed_platform_tools, sdk/cargo-build-sbf/src/main.rs:146).
          # On a fresh runner the dir doesn't exist yet, so it panics before it
          # can download platform-tools. Create it empty.
          mkdir -p "$HOME/.cache/solana"
          mkdir -p "$HOME/.config/solana"
          SOLANA_BIN="$HOME/.local/share/solana/install/active_release/bin"
          if [ ! -f "$HOME/.config/solana/id.json" ]; then
            "$SOLANA_BIN/solana-keygen" new \
              --no-bip39-passphrase --silent -o "$HOME/.config/solana/id.json"
          fi

      - name: Cache Anchor (avm)
        uses: actions/cache@v4
        id: anchor-cache
        with:
          path: |
            ~/.avm
            ~/.cargo/bin/avm
            ~/.cargo/bin/anchor
          key: anchor-avm-${{ runner.os }}-1.0.0

      - name: Install Anchor CLI 1.0.0
        if: steps.anchor-cache.outputs.cache-hit != 'true'
        run: |
          for i in 1 2 3; do
            cargo install --git https://github.com/coral-xyz/anchor avm --locked --force && break
            echo "cargo install avm failed (attempt $i/3), retrying in 15s..."
            sleep 15
          done
          avm install 1.0.0
          avm use 1.0.0

      - name: Ensure Anchor CLI
        run: |
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          avm use 1.0.0
          anchor --version

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Merkle unit tests
        run: cargo test --manifest-path programs/vesting/Cargo.toml merkle -- --nocapture

      - name: Rust unit + proptest
        run: cargo test --manifest-path programs/vesting/Cargo.toml --lib -- --nocapture

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Cargo audit
        run: cargo audit --ignore RUSTSEC-2021-0145 --ignore RUSTSEC-2026-0097 --ignore RUSTSEC-2024-0344 --ignore RUSTSEC-2022-0093

      - name: anchor build
        env:
          PROGRAM_KEYPAIR_JSON: ${{ secrets.PROGRAM_KEYPAIR_JSON }}
          CARGO_TARGET_DIR: ${{ github.workspace }}/target
        run: |
          mkdir -p target/deploy
          echo "$PROGRAM_KEYPAIR_JSON" > target/deploy/vesting-keypair.json
          if [ ! -s target/deploy/vesting-keypair.json ]; then
            echo "ERROR: keypair empty — update PROGRAM_KEYPAIR_JSON secret (Settings → Secrets → Actions)"
            exit 1
          fi
          # Verify keypair matches the program ID hardcoded in declare_id!
          EXPECTED_ID="G6iaigUdi2btFwUc2N65twfxwA8Ew5uKKhKJ5RJa8wvu"
          ACTUAL_ID=$(solana-keygen pubkey target/deploy/vesting-keypair.json)
          if [ "$ACTUAL_ID" != "$EXPECTED_ID" ]; then
            echo "ERROR: PROGRAM_KEYPAIR_JSON generates $ACTUAL_ID but declare_id! expects $EXPECTED_ID"
            echo "Fix: update the GitHub secret to the correct keypair for program $EXPECTED_ID"
            exit 1
          fi
          anchor build

      - name: Verify committed IDL matches build output
        run: |
          diff -q target/idl/vesting.json apps/web/src/lib/anchor/idl.json \
            || (echo "ERROR: apps/web/src/lib/anchor/idl.json is out of date — run anchor build and copy target/idl/vesting.json" && exit 1)

      # Mollusk instruction-level tests. Requires BPF .so from anchor build.
      # 72 active tests pass; 18 ignored (Mollusk 0.13.x init_if_needed/Optional<T> limitations).
      - name: Mollusk instruction tests
        env:
          BPF_OUT_DIR: ${{ github.workspace }}/target/deploy
          CARGO_TARGET_DIR: ${{ github.workspace }}/target
        run: |
          cd programs/vesting
          cargo test --test instructions -- --nocapture
          cargo test --test benchmarks -- --nocapture
          cargo test --test stream -- --nocapture
          cargo test --test lifecycle -- --nocapture
          cargo test --test admin -- --nocapture
          cargo test --test cancel -- --nocapture
          cargo test --test claim -- --nocapture
          cargo test --test cleanup -- --nocapture

      - name: Native SOL vesting tests (bankrun)
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/target
        run: pnpm exec ts-mocha -p ./tsconfig.json -t 1000000 'tests/vesting-native-sol.spec.ts'

      # Week 7 coverage gap tests — runs the dedicated gap suite (errors 6025,
      # 6036 and event listener assertions) on its own so failures are clearly
      # labelled. See docs/WEEK7_COVERAGE_REPORT.md for the full coverage matrix.
      - name: Coverage gap tests (localnet, week7-coverage-gaps.spec.ts)
        env:
          TEST_SKIP_BUILD: "1"
          TEST_RESET_VALIDATOR: "1"
          CARGO_TARGET_DIR: ${{ github.workspace }}/target
          ANCHOR_TEST_GLOB: "tests/week7-coverage-gaps.spec.ts"
        run: pnpm test:localnet

      - name: Integration tests (localnet)
        env:
          TEST_SKIP_BUILD: "1"
          TEST_RESET_VALIDATOR: "1"
          CARGO_TARGET_DIR: ${{ github.workspace }}/target
          # Flow 4 clawback withdraw can flake with "transaction already been processed"
          # when the RPC retries a tx that already landed (Anchor sendAndConfirm).
          MOCHA_RETRIES: "2"
        run: pnpm test:localnet
