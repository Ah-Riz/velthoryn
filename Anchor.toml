[toolchain]
anchor_version = "1.0.0"

[features]
resolution = true
skip-lint = false

[programs.localnet]
vesting = "G6iaigUdi2btFwUc2N65twfxwA8Ew5uKKhKJ5RJa8wvu"

[programs.devnet]
vesting = "G6iaigUdi2btFwUc2N65twfxwA8Ew5uKKhKJ5RJa8wvu"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
# Allow narrowing the test glob for faster, task-scoped runs:
#   ANCHOR_TEST_GLOB='tests/instant-refund-campaign.spec.ts' anchor test --skip-build
test = "bash -lc \"pnpm exec ts-mocha -p ./tsconfig.json -t 1000000 '${ANCHOR_TEST_GLOB:-tests/**/*.spec.ts}'\""
